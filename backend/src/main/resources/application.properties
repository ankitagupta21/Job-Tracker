spring.application.name=job-tracker

# Default profile
spring.profiles.active=local

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.group-id=job-tracker-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Gmail
gmail.credentials.path=src/main/resources/gmail/credentials.json
gmail.tokens.path=${user.home}/.job-tracker/tokens
gmail.scan.enabled=true

# Ollama
ollama.base-url=http://localhost:11434
ollama.model=phi3:mini
ollama.enabled=true

# Logging
logging.level.com.jobtracker=DEBUG